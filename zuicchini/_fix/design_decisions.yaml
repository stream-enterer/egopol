# Design decisions needed before fixing
# Generated: 2026-03-06
# Source: 20 verdict files + 8 mapping files
#
# Items here are either:
# 1. DESIGN-classified findings from triage.yaml (ambiguous correct behavior)
# 2. MISSING methods with no callers in current Rust code
#
# Each entry needs a human decision before implementation.

# ============================================================================
# INDIVIDUAL DESIGN DECISIONS (from triage.yaml)
# ============================================================================

individual:

  # --- Border ---

  - id: BORDER-001
    module: zuicchini/src/widget/border.rs
    question: "Should border geometry use proportional insets (C++ style) or keep fixed pixels?"
    decision: "Port C++ proportional geometry including BorderScaling."
    affects_files:
      - zuicchini/src/widget/border.rs

  - id: BORDER-002
    module: zuicchini/src/widget/border.rs
    question: "Should disabled state visual dimming be implemented?"
    decision: "Port disabled dimming (75% fg transparency, 80% bg blend)."
    affects_files:
      - zuicchini/src/widget/border.rs

  - id: BORDER-003
    module: zuicchini/src/widget/border.rs
    question: "Should round rect outlines follow the rounded shape?"
    decision: "Port. Add paint_round_rect_outlined to painter, use in border."
    affects_files:
      - zuicchini/src/widget/border.rs
      - zuicchini/src/render/painter.rs

  - id: BORDER-004
    module: zuicchini/src/widget/border.rs
    question: "Should icon support be added to border label painting?"
    decision: "Port icon support including image pipeline and layout."
    affects_files:
      - zuicchini/src/widget/border.rs

  - id: BORDER-005
    module: zuicchini/src/widget/border.rs
    question: "Should label alignment options be added?"
    decision: "Port CaptionAlignment/DescriptionAlignment."
    affects_files:
      - zuicchini/src/widget/border.rs

  # --- Layout ---

  - id: LAYOUT-001
    module: zuicchini/src/layout/linear.rs
    question: "Should LinearLayout apply tallness constraints on main axis?"
    decision: "Port iterative CalculateForce solver from C++."
    affects_files:
      - zuicchini/src/layout/linear.rs

  - id: LAYOUT-002
    module: zuicchini/src/layout/linear.rs
    question: "Should spacing model use proportional or absolute values?"
    decision: "Port C++ proportional spacing model."
    affects_files:
      - zuicchini/src/layout/linear.rs
      - zuicchini/src/layout/raster.rs
      - zuicchini/src/layout/pack.rs

  - id: LAYOUT-003
    module: zuicchini/src/layout/raster.rs
    question: "Should RasterLayout defaults match C++ (PrefCT=0.2, Center, column-major)?"
    decision: "Match C++ defaults."
    affects_files:
      - zuicchini/src/layout/raster.rs

  - id: LAYOUT-004
    module: zuicchini/src/layout/raster.rs
    question: "Should auto-grid scoring use log-error (scale-invariant) instead of linear?"
    decision: "Port log-error scoring."
    affects_files:
      - zuicchini/src/layout/raster.rs

  - id: LAYOUT-005
    module: zuicchini/src/layout/pack.rs
    question: "Should PackLayout scoring use ratio-cubed (scale-invariant) instead of linear?"
    decision: "Port ratio-cubed scoring."
    affects_files:
      - zuicchini/src/layout/pack.rs

  - id: LAYOUT-006
    module: zuicchini/src/layout/pack.rs
    question: "Should PackLayout default preferred_tallness be 0.2 (C++) or 1.0 (current)?"
    decision: "Use 0.2 to match C++."
    affects_files:
      - zuicchini/src/layout/pack.rs

  - id: LAYOUT-007
    module: zuicchini/src/layout/raster.rs
    question: "Should RasterLayout alignment field actually affect do_layout?"
    decision: "Wire alignment into do_layout (port C++ behavior)."
    affects_files:
      - zuicchini/src/layout/raster.rs

  # --- View ---

  - id: VIEW-001
    module: zuicchini/src/panel/view.rs
    question: "What is the architecture plan for View (currently ~5% complete)?"
    decision: >
      Full port of core coordinate/SVP/navigation systems. Also subsumes
      PANEL-005 (set_focusable active panel migration) and VIF-004
      (OS-level window focus via ViewPort abstraction).
    affects_files:
      - zuicchini/src/panel/view.rs

  - id: VIEW-002
    module: zuicchini/src/panel/view.rs
    question: "Should visit_fullsized compute proper fit or use identity zoom?"
    decision: "Port CalcVisitFullsizedCoords for proper fit."
    affects_files:
      - zuicchini/src/panel/view.rs

  - id: VIEW-003
    module: zuicchini/src/panel/view.rs
    question: "Should zoom implement fix-point zoom around center coordinates?"
    decision: "Port fix-point zoom."
    affects_files:
      - zuicchini/src/panel/view.rs

  - id: VIEW-004
    module: zuicchini/src/panel/view.rs
    question: "Should is_visible be replaced with viewport-intersection-based IsViewed?"
    decision: "Port viewport-intersection-based IsViewed."
    affects_files:
      - zuicchini/src/panel/view.rs

  # --- Animator ---

  - id: ANIM-003
    module: zuicchini/src/panel/animator.rs
    question: "Should friction model match C++ (linear drag) or keep exponential decay?"
    decision: "Port C++ linear drag model."
    affects_files:
      - zuicchini/src/panel/animator.rs

  - id: ANIM-004
    module: zuicchini/src/panel/animator.rs
    question: "Should animators support zoom (3rd) dimension?"
    decision: "Port 3D velocity. Depends on VIEW-001 coordinate math."
    affects_files:
      - zuicchini/src/panel/animator.rs
      - zuicchini/src/panel/view.rs

  # --- Painter ---

  - id: PAINT-001
    module: zuicchini/src/render/painter.rs
    question: "Should sub-pixel anti-aliasing be added to the CPU rasterizer?"
    decision: "Port C++ 12-bit fixed-point AA system."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-002
    module: zuicchini/src/render/painter.rs
    question: "Should polygon fill use non-zero winding rule instead of even-odd?"
    decision: "Port non-zero winding rule."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-003
    module: zuicchini/src/render/painter.rs
    question: "Should transform setters support absolute-set (C++ style) in addition to relative?"
    decision: "Port absolute-set transforms (set_origin/set_scaling)."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-004
    module: zuicchini/src/render/painter.rs
    question: "Should polyline rendering support joins, caps, and closed paths?"
    decision: "Port full polyline with joins, caps, and closed paths."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-005
    module: zuicchini/src/render/painter.rs
    question: "Should rect outline use polygon ring to avoid alpha overlap at corners?"
    decision: "Port polygon ring approach."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-006
    module: zuicchini/src/render/painter.rs
    question: "Should PaintEllipseSector normalize negative sweep and detect full circle?"
    decision: "Port normalization and full-circle detection."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-007
    module: zuicchini/src/render/painter.rs
    question: "Should contour stroke end types include contour offset (s) computation?"
    decision: "Port contour offset computation."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-008
    module: zuicchini/src/render/painter.rs
    question: "Should interpolation pipeline be ported (gradients, image scaling, quality modes)?"
    decision: "Port C++ fixed-point interpolation pipeline."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-009
    decision: "Duplicate of PAINT-001. Merged."

  - id: PAINT-010
    module: zuicchini/src/render/painter.rs
    question: "Should PaintImage support arbitrary scaling?"
    decision: "Port. Depends on PAINT-008 interpolation pipeline."
    affects_files:
      - zuicchini/src/render/painter.rs

  - id: PAINT-011
    module: zuicchini/src/render/painter.rs
    question: "Should PaintImageColored support two-color gradient blitting?"
    decision: "Port for C++ parity."
    affects_files:
      - zuicchini/src/render/painter.rs

  # --- Color / Image ---

  - id: COLOR-001
    module: zuicchini/src/foundation/color.rs
    question: "Which Color utility methods should be added?"
    decision: "Port all 9 missing methods."
    affects_files:
      - zuicchini/src/foundation/color.rs

  - id: IMAGE-001
    module: zuicchini/src/foundation/image.rs
    question: "Which Image utility methods should be added?"
    decision: "Port all 19 missing methods."
    affects_files:
      - zuicchini/src/foundation/image.rs

  # --- Window/Screen ---

  - id: WIN-001
    module: zuicchini/src/window/
    question: "Which window/screen utility methods should be added?"
    decision: >
      Modernization divergence: winit replaces platform backends.
      Port only methods not covered by winit.
    affects_files:
      - zuicchini/src/window/

  # --- Simple Widgets ---

  - id: WIDGET-001
    module: zuicchini/src/widget/
    question: "Should Button::click() (programmatic click) be added?"
    decision: "Port."
    affects_files:
      - zuicchini/src/widget/

  - id: WIDGET-002
    module: zuicchini/src/widget/
    question: "Should RadioGroup utility methods (count, get_button, index_of) be added?"
    decision: "Port."
    affects_files:
      - zuicchini/src/widget/

# ============================================================================
# BULK MISSING METHODS (from mapping files)
# ============================================================================
# These are C++ methods marked MISSING in mappings with no Rust callers.
# Classified as DESIGN: "method has no callers in Rust; need human decision
# on whether to port it."
#
# They are grouped by mapping file for reference. The human decision is:
# for each group, which methods (if any) are needed for the game?

bulk_missing:

  panel:
    count: 70
    mapping_file: zuicchini/_verify/mappings/panel.yaml
    rust_module: zuicchini/src/panel/
    notable_methods:
      - "GetIdentity / EncodeIdentity / DecodeIdentity (panel identity strings)"
      - "GetViewCondition / GetUpdatePriority (viewing optimization)"
      - "GetAutoExpansionThreshold (auto-expand tuning)"
      - "BeFirst / BeLast / Sort methods (sibling ordering)"
      - "GetHeight / GetTallness (derived geometry)"
      - "GetViewedX/Y/Width/Height (viewport-relative position)"
      - "IsInViewedPath / IsViewed / IsInActivePath (view flags)"
      - "FindActivePanel / activate methods (activation path)"
      - "IsCreatedByAE / CreatedByAE tracking"
      - "IsAutoExpanded / IsAutoShrunk"
      - "GetClipRect (clip rectangle)"
    decision: "Port all for C++ parity. Sequenced with VIEW-001."

  text_field:
    count: 52
    mapping_file: zuicchini/_verify/mappings/text_field.yaml
    rust_module: zuicchini/src/widget/text_field.rs
    notable_methods:
      - "Multi-line editing (GetRowIndex, GetColumnIndex, GetLineStart, etc.)"
      - "Word selection (GetWordStart, GetWordEnd, SelectWord)"
      - "Clipboard integration (DoCopy, DoCut, DoPaste)"
      - "Selection manipulation (SetSelection, SelectAll, SelectWord)"
      - "Overwrite mode (IsOverwriteMode, SetOverwriteMode)"
      - "Multi-line specific (GetRowCount, GetLineCount)"
      - "Context flags (IsEditable, SetEditable)"
      - "Validation hooks (CheckText, AdjustText)"
      - "DragAndDrop support (DragDropText)"
    decision: "Port all for C++ parity. Clipboard and selection first."

  painter:
    count: 27
    mapping_file: zuicchini/_verify/mappings/painter.yaml
    rust_module: zuicchini/src/render/painter.rs
    notable_methods:
      - "PaintTextBoxed (multi-line text with alignment)"
      - "PaintDashedPolyline (dashed/dotted lines)"
      - "PaintBorderImage / PaintBorderImageColored (9-slice)"
      - "PaintEllipseOutline (stroked ellipse)"
      - "PaintEllipseSectorOutline (stroked arc)"
      - "PaintRoundRectOutline (stroked rounded rect)"
      - "PaintBezierLine (Bezier curves)"
      - "PaintEllipseArc (stroked arc)"
      - "Clear (clear to clip bounds)"
      - "GetUserClip* accessors"
      - "SharedModel (pixel format caching)"
    decision: >
      Port all for C++ parity. Priority: Clear, PaintRoundRectOutline
      (needed by BORDER-003), PaintTextBoxed.

  view:
    count: 28
    mapping_file: zuicchini/_verify/mappings/view.yaml
    rust_module: zuicchini/src/panel/view.rs
    notable_methods:
      - "10 directional navigation methods (VisitNext/Prev/In/Out/Left/Right/Up/Down)"
      - "RawVisitAbs / RawScrollAndZoom (core coordinate math)"
      - "CalcVisitCoords / CalcVisitFullsizedCoords"
      - "FindBestSVP / FindBestSVPInTree"
      - "SetActivePanelBestPossible"
      - "GetPanelAt / GetFocusablePanelAt (hit testing)"
      - "Input / RecurseInput (input dispatch)"
      - "Update (main loop integration)"
      - "SetBackgroundColor"
    decision: "Port all for C++ parity. Part of VIEW-001."

  border:
    count: 25
    mapping_file: zuicchini/_verify/mappings/border.yaml
    rust_module: zuicchini/src/widget/border.rs
    notable_methods:
      - "SetIcon / SetLabel (icon support)"
      - "SetLabelAlignment / SetCaptionAlignment / SetDescriptionAlignment"
      - "SetBorderScaling"
      - "HaveAux / RemoveAux / GetAuxRect (auxiliary panel area)"
      - "GetSubstanceRect / GetContentRoundRect / GetContentRectUnobscured"
      - "IsOpaque (opacity query)"
      - "HasHowTo / GetHowTo / HowToPreface / HowToDisabled / HowToFocus"
      - "SetLabelInBorder / SetMaxIconAreaTallness / SetIconAboveCaption"
      - "GetBestLabelTallness"
    decision: >
      Port all except HowTo system (intentionally dropped).
      Icon, aux, and alignment methods included per BORDER-004/005.

  painter_ScTl:
    count: 14
    mapping_file: zuicchini/_verify/mappings/painter_ScTl.yaml
    rust_module: zuicchini/src/render/painter.rs
    notable_methods:
      - "ScanlineTool::Init (dispatch infrastructure)"
      - "PaintScanlineInt (textured scanline blending)"
      - "PaintLargeScanlineInt (chunked scanline for SIMD)"
      - "InterpolateImageBilinear (bilinear filtering)"
      - "InterpolateImageBicubic (bicubic filtering)"
      - "InterpolateImageLanczos (Lanczos filtering)"
      - "InterpolateImageAdaptive (edge-adaptive filtering)"
      - "InterpolateImageAreaSampled (downscale box filter)"
      - "InterpolateRadialGradient"
      - "InterpolateFourValuesAdaptive (edge-adaptive helper)"
    decision: "Port all for C++ parity. Part of PAINT-008."

  layout:
    count: 3
    mapping_file: zuicchini/_verify/mappings/layout.yaml
    rust_module: zuicchini/src/layout/
    notable_methods:
      - "emTiling (deprecated, replaced by RasterLayout)"
      - "emPackLayout::SetMinCellCount"
      - "emPackLayout::GetMinCellCount"
    decision: "emTiling intentionally dropped (deprecated in C++). Port MinCellCount."

  scheduler:
    count: 1
    mapping_file: zuicchini/_verify/mappings/scheduler.yaml
    rust_module: zuicchini/src/scheduler/
    notable_methods:
      - "emStandardScheduler::InitiateTermination"
    decision: "Modernization divergence: winit handles termination. Skip."

# ============================================================================
# CROSS-MODULE DEPENDENCIES
# ============================================================================

cross_module_dependencies:
  - change: "Adding PaintRoundRectOutline to painter"
    affects:
      - zuicchini/src/render/painter.rs  # new method
      - zuicchini/src/widget/border.rs    # caller

  - change: "Implementing View coordinate transform (RawVisitAbs)"
    affects:
      - zuicchini/src/panel/view.rs       # core implementation
      - zuicchini/src/panel/animator.rs    # zoom animation needs transforms
      - zuicchini/src/panel/input_filter.rs  # navigation uses transforms

  - change: "Adding sub-pixel AA to painter"
    affects:
      - zuicchini/src/render/painter.rs   # core pipeline
      - zuicchini/src/foundation/color.rs # may need blend helpers

  - change: "Implementing interpolation pipeline"
    affects:
      - zuicchini/src/render/painter.rs   # core implementation
      - zuicchini/src/render/texture.rs   # texture types defined here
      - zuicchini/src/widget/border.rs    # may enable TGA border images

  - change: "Panel viewing flags (Viewed, InViewedPath)"
    affects:
      - zuicchini/src/panel/data.rs       # new fields on PanelData
      - zuicchini/src/panel/view.rs       # sets flags during SVP computation
      - zuicchini/src/panel/tree.rs       # may need flag propagation

# ============================================================================
# SUMMARY
# ============================================================================

summary:
  individual_design_decisions: 29
  decisions_resolved: 29
  decision_principle: >
    100% C++ parity except where Rust offers an unambiguous improvement
    or a compatibility/modernization change necessitates divergence.
  modernization_divergences:
    - "WIN-001: winit replaces platform backends"
    - "Scheduler termination: winit handles app lifecycle"
  intentional_drops:
    - "emTiling: deprecated in C++ itself"
    - "HowTo system: dropped from border"
  duplicates_merged:
    - "PAINT-009 merged into PAINT-001"
  bulk_missing_groups: 8
  bulk_missing_total_methods: 220
  bulk_decision: "Port all for C++ parity (except drops above)"
  cross_module_dependencies: 5
